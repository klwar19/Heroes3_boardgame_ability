function RichText({ text, allIcons }) {
  const parts = [];
  const re = /:([\w]+):/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ t:"txt", v:text.slice(last, m.index) });
    const k = m[1].toLowerCase();
    if (k === "or") parts.push({ t:"or" });
    else if (allIcons[k]) parts.push({ t:"icon", k, icon:allIcons[k] });
    else parts.push({ t:"txt", v:m[0] });
    last = re.lastIndex;
  }
  if (last < text.length) parts.push({ t:"txt", v:text.slice(last) });
  return (
    <span>
      {parts.map((p, i) => {
        if (p.t === "txt") return <span key={i}>{p.v}</span>;
        if (p.t === "or") return <span key={i} style={{fontWeight:"bold",margin:"0 3px",fontSize:"0.85em",opacity:0.7}}>OR</span>;
        return <img key={i} src={p.icon.url} alt={p.icon.label} title={`:${p.k}:`}
          onError={e=>{e.target.style.display="none";}}
          style={{height:"1.1em",width:"auto",verticalAlign:"middle",margin:"0 1px",display:"inline"}} />;
      })}
    </span>
  );
}

function useDrag(onMove) {
  const dr = useRef(false); const s0 = useRef({x:0,y:0});
  return useCallback((e) => {
    e.preventDefault(); e.stopPropagation();
    dr.current=true; s0.current={x:e.clientX,y:e.clientY};
    const mv = ev => { if(!dr.current)return; onMove(ev.clientX-s0.current.x,ev.clientY-s0.current.y); s0.current={x:ev.clientX,y:ev.clientY}; };
    const up = () => { dr.current=false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  }, [onMove]);
}

function RH({ dir, onResize, color }) {
  const pos = {
    e:{right:-5,top:"50%",transform:"translateY(-50%)",cursor:"ew-resize"},
    w:{left:-5,top:"50%",transform:"translateY(-50%)",cursor:"ew-resize"},
    s:{bottom:-5,left:"50%",transform:"translateX(-50%)",cursor:"ns-resize"},
    se:{right:-5,bottom:-5,cursor:"nwse-resize"},
  }[dir];
  const dr=useRef(false); const s0=useRef({x:0,y:0});
  const md = e => {
    e.preventDefault(); e.stopPropagation(); dr.current=true; s0.current={x:e.clientX,y:e.clientY};
    const mv=ev=>{ if(!dr.current)return; onResize(dir,ev.clientX-s0.current.x,ev.clientY-s0.current.y); s0.current={x:ev.clientX,y:ev.clientY}; };
    const up=()=>{ dr.current=false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  };
  return <div onMouseDown={md} style={{position:"absolute",width:10,height:10,borderRadius:2,background:color,border:"1px solid rgba(255,255,255,0.4)",zIndex:10,...pos}} />;
}

function DBox({ id, lay, isSel, em, onSel, onUpd, color, children }) {
  const mv = useCallback((dx,dy) => onUpd(id, l => ({...l,
    cx:Math.max(l.w/2,Math.min(100-l.w/2,l.cx+dx/CARD_W*100)),
    cy:Math.max(l.h/2,Math.min(100-l.h/2,l.cy+dy/CARD_H*100))
  })), [id,onUpd]);
  const rs = useCallback((dir,dx,dy) => onUpd(id, l => {
    let {cx,cy,w,h}=l;
    if(dir==="e") w=Math.max(5,w+dx/CARD_W*100);
    if(dir==="w") {const dw=-dx/CARD_W*100;cx-=dw/2;w=Math.max(5,w+dw);}
    if(dir==="s") h=Math.max(3,h+dy/CARD_H*100);
    if(dir==="se"){w=Math.max(5,w+dx/CARD_W*100);h=Math.max(3,h+dy/CARD_H*100);}
    return {...l,cx,cy,w,h};
  }), [id,onUpd]);
  const ds = useDrag(mv);
  const L=(lay.cx-lay.w/2)/100*CARD_W, T=(lay.cy-lay.h/2)/100*CARD_H;
  return (
    <div onMouseDown={e=>{if(em){onSel(id);ds(e);}}}
      style={{position:"absolute",left:L,top:T,width:lay.w/100*CARD_W,height:lay.h/100*CARD_H,
        cursor:em?"move":"default",
        outline:em&&isSel?`1.5px dashed ${color}`:em?"1px dashed rgba(200,160,0,0.12)":"none",
        boxSizing:"border-box",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>
      {children}
      {em&&isSel&&<>
        <RH dir="e" onResize={rs} color={color} /><RH dir="w" onResize={rs} color={color} />
        <RH dir="s" onResize={rs} color={color} /><RH dir="se" onResize={rs} color={color} />
        <div style={{position:"absolute",top:-16,left:0,whiteSpace:"nowrap",fontSize:8,fontFamily:"monospace",color,background:"rgba(0,0,0,0.85)",padding:"1px 4px",borderRadius:3,pointerEvents:"none"}}>
          {id} {Math.round(lay.cx)},{Math.round(lay.cy)} {Math.round(lay.w)}x{Math.round(lay.h)}%
        </div>
      </>}
    </div>
  );
}

function DIllus({ lay, isSel, em, onSel, onUpd, illus, vign, blend }) {
  const mv = useCallback((dx,dy) => onUpd("illus", l => ({...l,
    cx:Math.max(l.w/2,Math.min(100-l.w/2,l.cx+dx/CARD_W*100)),
    cy:Math.max(l.h/2,Math.min(100-l.h/2,l.cy+dy/CARD_H*100))
  })), [onUpd]);
  const rs = useCallback((dir,dx,dy) => onUpd("illus", l => {
    let {cx,cy,w,h}=l;
    if(dir==="e") w=Math.max(5,w+dx/CARD_W*100);
    if(dir==="w") {const dw=-dx/CARD_W*100;cx-=dw/2;w=Math.max(5,w+dw);}
    if(dir==="s") h=Math.max(5,h+dy/CARD_H*100);
    if(dir==="se"){w=Math.max(5,w+dx/CARD_W*100);h=Math.max(5,h+dy/CARD_H*100);}
    return {...l,cx,cy,w,h};
  }), [onUpd]);
  const ds=useDrag(mv); const color="rgba(100,180,255,0.9)";
  const L=(lay.cx-lay.w/2)/100*CARD_W, T=(lay.cy-lay.h/2)/100*CARD_H;
  const r=`${lay.radius||0}%`; const va=(vign/100).toFixed(2);
  return (
    <div onMouseDown={e=>{if(em){onSel("illus");ds(e);}}}
      style={{position:"absolute",left:L,top:T,width:lay.w/100*CARD_W,height:lay.h/100*CARD_H,
        borderRadius:r,overflow:"hidden",cursor:em?"move":"default",
        outline:em&&isSel?`1.5px dashed ${color}`:em?"1px dashed rgba(100,180,255,0.12)":"none",
        boxSizing:"border-box",userSelect:"none"}}>
      {illus&&<img src={illus} alt="illus"
        style={{width:"100%",height:"100%",objectFit:"cover",display:"block",mixBlendMode:blend,pointerEvents:"none"}} />}
      {vign>0&&<div style={{position:"absolute",inset:0,
        background:`radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,${va}) 100%)`,
        borderRadius:r,pointerEvents:"none"}} />}
      {em&&isSel&&<>
        <RH dir="e" onResize={rs} color={color} /><RH dir="w" onResize={rs} color={color} />
        <RH dir="s" onResize={rs} color={color} /><RH dir="se" onResize={rs} color={color} />
        <div style={{position:"absolute",top:-16,left:0,whiteSpace:"nowrap",fontSize:8,fontFamily:"monospace",color,background:"rgba(0,0,0,0.85)",padding:"1px 4px",borderRadius:3,pointerEvents:"none"}}>
          illus {Math.round(lay.cx)},{Math.round(lay.cy)} {Math.round(lay.w)}x{Math.round(lay.h)}% r={lay.radius}%
        </div>
      </>}
    </div>
  );
}

              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:16}}>
                {Object.entries(allIcons).map(([k,ic])=>(
                  <div key={k} title={`Copy :${k}:`} onClick={()=>navigator.clipboard?.writeText(`:${k}:`)}
                    style={{display:"flex",alignItems:"center",gap:4,padding:"4px 7px",background:"#160f06",border:"1px solid rgba(80,50,10,0.4)",borderRadius:4,cursor:"pointer",fontSize:10.5,fontFamily:"monospace",color:"rgba(160,120,50,0.85)",transition:"all 0.12s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#c8a020";e.currentTarget.style.color="#e8c060";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(80,50,10,0.4)";e.currentTarget.style.color="rgba(160,120,50,0.85)";}}>
                    <img src={ic.url} alt={ic.label} style={{height:16,width:"auto",maxWidth:22}} onError={e=>{e.target.style.display="none";}} />
                    <span>:{k}:</span>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(184,144,40,0.75)",fontFamily:"sans-serif",marginBottom:8}}>Add Custom Icon</div>
              <div style={{background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"12px",border:"1px solid rgba(80,50,10,0.25)"}}>
                <div style={IS.S}><label style={IS.L}>Code name</label><input style={IS.I} value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. fire => :fire:" /></div>
                <div style={IS.S}>
                  <div onClick={()=>icRef.current.click()} style={{border:"1.5px dashed rgba(80,50,10,0.45)",borderRadius:5,padding:8,textAlign:"center",cursor:"pointer",fontSize:11,fontFamily:"sans-serif",color:"rgba(150,100,30,0.5)",minHeight:38,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {newIcon?<img src={newIcon} style={{height:28,width:"auto"}} />:<span>Upload PNG/SVG</span>}
                  </div>
                  <input ref={icRef} type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setNewIcon(ev.target.result);r.readAsDataURL(f);}} style={{display:"none"}} />
                </div>
                <button onClick={()=>{if(!newName.trim()||!newIcon)return;const k=newName.trim().toLowerCase().replace(/[^a-z0-9_]/g,"_");setCustom(p=>({...p,[k]:{url:newIcon,label:newName}}));setNewName("");setNewIcon(null);if(icRef.current)icRef.current.value="";}}
                  disabled={!newName.trim()||!newIcon}
                  style={{...IS.B,opacity:(!newName.trim()||!newIcon)?0.3:1,borderColor:"rgba(200,160,0,0.5)",color:"#e8c060"}}>
                  + Add Icon
                </button>
              </div>
            </>}

          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{color:"rgba(80,60,30,0.4)",fontFamily:"sans-serif",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase"}}>Live Preview</span>
            {em&&<span style={{fontSize:10,fontFamily:"sans-serif",color:"rgba(200,160,0,0.7)",background:"rgba(200,160,0,0.08)",border:"1px solid rgba(200,160,0,0.2)",borderRadius:10,padding:"2px 8px"}}>drag mode</span>}
          </div>
          <Card state={state} allIcons={allIcons} selEl={selEl} onSel={setSelEl} onUpd={updLayout} em={em} cardRef={cardRef} />
          <button onClick={exportCard} disabled={busy}
            style={{background:busy?"rgba(200,160,0,0.1)":"rgba(200,160,0,0.06)",border:"1px solid rgba(200,160,0,0.5)",borderRadius:6,color:busy?"rgba(200,160,0,0.4)":"#e8c060",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.08em",cursor:busy?"wait":"pointer",padding:"10px 0",transition:"all 0.2s",width:CARD_W}}>
            {busy?"Exporting...":"Export as PNG (3x resolution)"}
          </button>
          <p style={{color:"rgba(50,35,15,0.3)",fontSize:9,fontFamily:"sans-serif",textAlign:"center",maxWidth:CARD_W,lineHeight:1.5}}>
            Fan-made tool &middot; HoMM3 assets &copy; Ubisoft / Archon Studio
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
